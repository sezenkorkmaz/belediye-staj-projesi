{% extends 'temel.html' %}

{% block baslik %}Yeni İzin Talebi{% endblock %}

{% block icerik %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h5 class="mb-4"><i class="fas fa-plus me-2"></i>Yeni İzin Talebi Oluştur</h5>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">İzin Türü</label>
                    <select name="izin_turu" class="form-select" required>
                        <option value="">Seçiniz...</option>
                        <option value="yillik">Yıllık İzin</option>
                        <option value="hastalik">Hastalık İzni</option>
                        <option value="mazeret">Mazeret İzni</option>
                        <option value="ucretsiz">Ücretsiz İzin</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Başlangıç Tarihi</label>
                    <input type="date" name="baslangic_tarihi" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bitiş Tarihi</label>
                    <input type="date" name="bitis_tarihi" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Açıklama (İsteğe bağlı)</label>
                    <textarea name="aciklama" class="form-control" rows="3"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane me-2"></i>Talebi Gönder
                    </button>
                    <a href="/personel-panel/" class="btn btn-secondary">İptal</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
