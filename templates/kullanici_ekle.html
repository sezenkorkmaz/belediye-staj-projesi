{% extends 'temel.html' %}

{% block baslik %}Kullanıcı Ekle{% endblock %}

{% block icerik %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h5 class="mb-4"><i class="fas fa-user-plus me-2"></i>Yeni Kullanıcı Ekle</h5>
            <form method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ad</label>
                        <input type="text" name="ad" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Soyad</label>
                        <input type="text" name="soyad" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Kullanıcı Adı</label>
                    <input type="text" name="kullanici_adi" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Şifre</label>
                    <input type="password" name="sifre" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-posta</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select name="rol" class="form-select" required>
                        <option value="personel">Personel</option>
                        <option value="amir">Amir</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Departman</label>
                    <input type="text" name="departman" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Telefon</label>
                    <input type="text" name="telefon" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Yıllık İzin Hakkı (Gün)</label>
                    <input type="number" name="yillik_izin_hakki" class="form-control" value="14">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus me-2"></i>Kullanıcı Ekle
                    </button>
                    <a href="/admin-panel/" class="btn btn-secondary">İptal</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
